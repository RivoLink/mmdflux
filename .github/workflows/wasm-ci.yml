name: WASM CI

on:
  push:
    paths:
      - "crates/mmdflux-wasm/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Justfile"
      - "scripts/run-wasm-browser-tests.sh"
      - ".github/workflows/wasm-ci.yml"
  pull_request:
    paths:
      - "crates/mmdflux-wasm/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Justfile"
      - "scripts/run-wasm-browser-tests.sh"
      - ".github/workflows/wasm-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  WASM_PACK_VERSION: 0.14.0
  WASM_WEB_OUT_DIR: target/wasm-pkg-web
  WASM_BUNDLER_OUT_DIR: target/wasm-pkg-bundler
  WASM_CARGO_PROFILE_RELEASE_OPT_LEVEL: z
  WASM_CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1
  WASM_CARGO_PROFILE_RELEASE_LTO: fat
  WASM_CARGO_PROFILE_RELEASE_PANIC: abort
  # Size budgets are regression guardrails, not "match Mermaid.js" targets.
  # Mermaid's minified bundle is ~2.7 MB; mmdflux release wasm is currently
  # about ~1.9 MB raw / ~0.6 MB gzip. Keep headroom to catch accidental bloat,
  # then tighten as size work lands.
  WASM_MAX_BYTES: 2097152
  WASM_GZIP_MAX_BYTES: 700000

jobs:
  wasm:
    name: Build, Test, and Size Budget
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm-ci

      - name: Install wasm-pack
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v wasm-pack >/dev/null 2>&1 || [[ "$(wasm-pack --version | awk '{print $2}')" != "${WASM_PACK_VERSION}" ]]; then
            cargo install wasm-pack --version "${WASM_PACK_VERSION}" --locked
          fi
          wasm-pack --version

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Build WASM package (web target)
        env:
          CARGO_PROFILE_RELEASE_OPT_LEVEL: ${{ env.WASM_CARGO_PROFILE_RELEASE_OPT_LEVEL }}
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: ${{ env.WASM_CARGO_PROFILE_RELEASE_CODEGEN_UNITS }}
          CARGO_PROFILE_RELEASE_LTO: ${{ env.WASM_CARGO_PROFILE_RELEASE_LTO }}
          CARGO_PROFILE_RELEASE_PANIC: ${{ env.WASM_CARGO_PROFILE_RELEASE_PANIC }}
        run: wasm-pack build crates/mmdflux-wasm --target web --release --out-dir ../../${{ env.WASM_WEB_OUT_DIR }}

      - name: Build WASM package (bundler target)
        env:
          CARGO_PROFILE_RELEASE_OPT_LEVEL: ${{ env.WASM_CARGO_PROFILE_RELEASE_OPT_LEVEL }}
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: ${{ env.WASM_CARGO_PROFILE_RELEASE_CODEGEN_UNITS }}
          CARGO_PROFILE_RELEASE_LTO: ${{ env.WASM_CARGO_PROFILE_RELEASE_LTO }}
          CARGO_PROFILE_RELEASE_PANIC: ${{ env.WASM_CARGO_PROFILE_RELEASE_PANIC }}
        run: wasm-pack build crates/mmdflux-wasm --target bundler --release --out-dir ../../${{ env.WASM_BUNDLER_OUT_DIR }}

      - name: Run host wasm contract tests
        run: cargo test -p mmdflux-wasm --locked

      - name: Run browser tests
        run: ./scripts/run-wasm-browser-tests.sh

      - name: Report and enforce WASM size budget
        run: ./scripts/check-wasm-size.sh --no-build
