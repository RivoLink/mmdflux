name: Crate Release

on:
  push:
    tags:
      - "mmdflux-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., mmdflux-v2.1.0)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: crate-release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish mmdflux
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
