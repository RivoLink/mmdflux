name: Packages CI

on:
  push:
    paths:
      - "packages/**"
      - ".github/workflows/packages-ci.yml"
  pull_request:
    paths:
      - "packages/**"
      - ".github/workflows/packages-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/package-lock.json

      - name: Install dependencies
        working-directory: packages
        run: npm ci

      - name: Check formatting and lint
        working-directory: packages
        run: npm run check -ws

  test:
    name: Test
    runs-on: ubuntu-latest
    needs:
      - lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/package-lock.json

      - name: Install dependencies
        working-directory: packages
        run: npm ci

      - name: Build all packages
        working-directory: packages
        run: npm run build -ws

      - name: Run tests
        working-directory: packages
        run: npm test -ws
