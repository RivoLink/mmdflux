name: Playground CI

on:
  push:
    paths:
      - "web/**"
      - "crates/mmdflux-wasm/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Justfile"
      - ".github/workflows/playground-ci.yml"
  pull_request:
    paths:
      - "web/**"
      - "crates/mmdflux-wasm/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Justfile"
      - ".github/workflows/playground-ci.yml"
  workflow_dispatch:
    inputs:
      run_benchmark_smoke:
        description: "Run optional benchmark smoke checks"
        required: false
        default: false
        type: boolean
      benchmark_profile:
        description: "WASM build profile for optional benchmark smoke checks"
        required: false
        default: dev
        type: choice
        options:
          - dev
          - release

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  WASM_PACK_VERSION: 0.14.0

jobs:
  playground:
    name: Test and Build Playground
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: playground-ci

      - name: Install wasm-pack
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v wasm-pack >/dev/null 2>&1 || [[ "$(wasm-pack --version | awk '{print $2}')" != "${WASM_PACK_VERSION}" ]]; then
            cargo install wasm-pack --version "${WASM_PACK_VERSION}" --locked
          fi
          wasm-pack --version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Run playground tests
        working-directory: web
        run: npm run test

      - name: Build playground
        working-directory: web
        run: npm run build

      - name: Deploy preview (attempt 1)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        id: deploy_preview_1
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "3.90.0"
          command: pages deploy web/dist --project-name=mmdflux-play --branch=${{ github.head_ref }}

      - name: Deploy preview (attempt 2)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && steps.deploy_preview_1.outcome == 'failure'
        id: deploy_preview_2
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "3.90.0"
          command: pages deploy web/dist --project-name=mmdflux-play --branch=${{ github.head_ref }}

      - name: Deploy preview (attempt 3)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && steps.deploy_preview_1.outcome == 'failure' && steps.deploy_preview_2.outcome == 'failure'
        id: deploy_preview_3
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "3.90.0"
          command: pages deploy web/dist --project-name=mmdflux-play --branch=${{ github.head_ref }}

      - name: Fail if preview deploy did not succeed after retries
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && steps.deploy_preview_1.outcome == 'failure' && steps.deploy_preview_2.outcome == 'failure' && steps.deploy_preview_3.outcome == 'failure'
        run: |
          echo "Cloudflare preview deploy failed after 3 attempts."
          exit 1

      - name: Resolve preview deployment URLs
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && (steps.deploy_preview_1.outcome == 'success' || steps.deploy_preview_2.outcome == 'success' || steps.deploy_preview_3.outcome == 'success')
        id: preview_urls
        env:
          DEPLOYMENT_URL_1: ${{ steps.deploy_preview_1.outputs['deployment-url'] }}
          DEPLOYMENT_URL_2: ${{ steps.deploy_preview_2.outputs['deployment-url'] }}
          DEPLOYMENT_URL_3: ${{ steps.deploy_preview_3.outputs['deployment-url'] }}
          ALIAS_URL_1: ${{ steps.deploy_preview_1.outputs['pages-deployment-alias-url'] }}
          ALIAS_URL_2: ${{ steps.deploy_preview_2.outputs['pages-deployment-alias-url'] }}
          ALIAS_URL_3: ${{ steps.deploy_preview_3.outputs['pages-deployment-alias-url'] }}
        run: |
          deployment_url="$DEPLOYMENT_URL_1"
          alias_url="$ALIAS_URL_1"

          if [ -z "$deployment_url" ]; then
            deployment_url="$DEPLOYMENT_URL_2"
            alias_url="$ALIAS_URL_2"
          fi

          if [ -z "$deployment_url" ]; then
            deployment_url="$DEPLOYMENT_URL_3"
            alias_url="$ALIAS_URL_3"
          fi

          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "alias_url=$alias_url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR (best-effort)
        if: github.event_name == 'pull_request' && steps.preview_urls.outputs.deployment_url && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.preview_urls.outputs.deployment_url }}
          PREVIEW_ALIAS_URL: ${{ steps.preview_urls.outputs.alias_url }}
        with:
          script: |
            const marker = '<!-- mmdflux-playground-preview -->';
            const issue_number = context.issue.number;
            const previewUrl = process.env.PREVIEW_URL;
            const previewAliasUrl = process.env.PREVIEW_ALIAS_URL;

            const lines = [
              marker,
              '## Playground Preview',
              '',
              `- Preview: ${previewUrl}`,
            ];

            if (previewAliasUrl) {
              lines.push(`- Alias: ${previewAliasUrl}`);
            }

            lines.push(`- Commit: \`${context.sha.slice(0, 7)}\``);
            const body = lines.join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

      - name: Run benchmark smoke checks (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_benchmark_smoke == 'true' }}
        working-directory: web
        shell: bash
        env:
          BENCHMARK_PROFILE: ${{ github.event.inputs.benchmark_profile }}
        run: |
          if [[ "$BENCHMARK_PROFILE" == "release" ]]; then
            npm run benchmark:smoke:release
          else
            npm run benchmark:smoke
          fi
