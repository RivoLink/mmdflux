<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 285.99 264.00" style="max-width: 285.99px; background-color: transparent;" font-family="&quot;trebuchet ms&quot;, verdana, arial, sans-serif" font-size="16.00">
  <defs>
