<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 282.00 554.00" style="max-width: 282.00px; background-color: transparent;" font-family="&quot;trebuchet ms&quot;, verdana, arial, sans-serif" font-size="16.00">
  <defs>
