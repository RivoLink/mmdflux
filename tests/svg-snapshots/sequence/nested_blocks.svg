<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 244.82 374.00" style="max-width: 244.82px; background-color: transparent;" font-family="&quot;trebuchet ms&quot;, verdana, arial, sans-serif" font-size="16.00">
